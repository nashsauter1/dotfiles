format = """
[ŅéČ](#9A348E)\
$username\
[Ņé░](bg:#DA627D fg:#9A348E)\
$directory\
[Ņé░](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Ņé░](fg:#FCA17D bg:#86BBD8)\
$battery\
[Ņé░](fg:#86BBD8 bg:#33658A)\
$time\
[Ņé░ ](fg:#33658A)\
$line_break\
$character"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ’äĀ to save some space
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[character]
success_symbol = "[ŌØ»](purple)"
error_symbol = "[ŌØ»](red)"
vicmd_symbol = "[ŌØ«](green)"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "’£ś "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ’£ś’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ’£ś " = " ’£ś’ä¬ "

[git_branch]
symbol = "’Éś"
style = "bg:#FCA17D"
format = '[[ $symbol $branch ](bg:#FCA17D)]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[[($all_status$ahead_behind )](bg:#FCA17D)]($style)'

# [nodejs]
# symbol = "Ņ£ś"
