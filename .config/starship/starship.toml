# format = '[[ $symbol ($version) ](bg:#86BBD8)]($style)'
# [rust]
# symbol = "Ņ×©"
# style = "bg:#86BBD8"
# format = '[[ $symbol ($version) ](bg:#86BBD8)]($style)'


[battery]
format = "[ $symbol$percentage ]($style)"

[[battery.display]]
threshold = 100
style = "bg:#86BBD8"

[time]
disabled = false
time_format = "%I:%M %p" # Hour:Minute Format
style = "bg:#33658A"
format = '[[ ’Öæ $time ](bg:#33658A)]($style)'
